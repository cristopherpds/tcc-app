# nome do workflow
name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.repository_owner }}
        password: ${{ secrets.GHC_PAT }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/tcc-app:${{ github.ref_name }}
        labels: |
          org.opencontainers.image.source=${{ github.repository }}

    - name: Checkout tcc-ops repository
      uses: actions/checkout@v2
      with:
        repository: cristopherpds/tcc-ops
        token: ${{ secrets.PAT }}  # token de acesso pessoal
        path: tcc-ops
        ref: deploy/app  # usamos o branch deploy/app

    # 6. Atualiza a tag da imagem no deployment.yml
    - name: Update image tag in deployment.yml
      run: |
        TAG=${GITHUB_REF##*/}
        VERSION=${TAG}
        sed -i "s|image: ghcr.io/${{ github.repository_owner }}/tcc-app:.*|image: ghcr.io/${{ github.repository_owner }}/tcc-app:$VERSION|" tcc-ops/k8s/deployment.yml

    # 7. Commit e push das alterações para deploy/app
    - name: Commit and push changes to deploy/app
      run: |
        cd tcc-ops
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"

        git add k8s/deployment.yml
        git commit -m "chore(deploy): release $VERSION"
        git push origin deploy/app